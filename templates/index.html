<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🐱🐶 Cat vs Dog Classifier</title>
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        /* Reset some default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 25px;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .custom-file-upload:hover {
            background-color: #ff3b3b;
        }

        button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            cursor: pointer;
            background-color: #1dd1a1;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #10ac84;
        }

        .preview {
            margin-top: 20px;
        }

        .preview img {
            max-width: 100%;
            border-radius: 15px;
            border: 3px solid #ff6b6b;
        }

        .result {
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱🐶 Cat vs Dog Classifier</h1>

        <form method="POST" enctype="multipart/form-data">
            <label class="custom-file-upload">
                Choose Image
                <input type="file" name="file" onchange="previewImage(event)" required>
            </label>
            <br>
            <button type="submit">Predict</button>
        </form>

        {% if result %}
            <div class="preview">
                <img src="{{ img_path }}" alt="Uploaded Image">
            </div>
            <div class="result">
                Prediction: {{ result }}
            </div>
        {% endif %}
    </div>

    <script>
        // Image preview before upload
        function previewImage(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let previewDiv = document.querySelector('.preview');
                    if (!previewDiv) {
                        previewDiv = document.createElement('div');
                        previewDiv.className = 'preview';
                        input.parentNode.appendChild(previewDiv);
                    }
                    previewDiv.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
